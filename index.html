<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Agentes · Piero</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111823;
    --panel-edge: #1c2735;
    --ink: #e8edf4;
    --ink-dim: #7b8aa0;
    --ink-faint: #4a5870;
    --live: #3fd28b;
    --live-glow: rgba(63,210,139,0.18);
    --idle: #d8a93f;
    --off: #3a4658;
    --accent: #4d8dff;
    --mono: 'SF Mono', 'JetBrains Mono', 'Consolas', ui-monospace, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 28px 20px 60px;
    background-image: radial-gradient(circle at 20% -10%, rgba(77,141,255,0.06), transparent 40%);
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 1px solid var(--panel-edge);
    padding-bottom: 18px; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;
  }
  .title { font-size: 13px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--ink-dim); font-weight: 600; }
  .title b { color: var(--ink); font-weight: 700; }
  .clock { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); letter-spacing: 0.08em; }
  .sync {
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    margin: 14px 0 24px; display: flex; align-items: center; gap: 8px;
  }
  .sync .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); box-shadow: 0 0 8px var(--live); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .grid { display: grid; gap: 14px; }
  .agent {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 20px 22px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 18px; align-items: center;
    position: relative; overflow: hidden;
    transition: border-color 0.25s, transform 0.15s;
  }
  .agent::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--off); transition: background 0.25s;
  }
  .agent.activo::before { background: var(--live); box-shadow: 0 0 16px var(--live-glow); }
  .agent.pendiente::before { background: var(--idle); }
  .agent:hover { border-color: #28384d; transform: translateY(-1px); }

  .badge {
    width: 44px; height: 44px; border-radius: 11px;
    display: grid; place-items: center;
    font-family: var(--mono); font-size: 17px; font-weight: 700;
    background: #0c121b; border: 1px solid var(--panel-edge); color: var(--ink-dim);
  }
  .agent.activo .badge { color: var(--live); border-color: rgba(63,210,139,0.3); }

  .meta { min-width: 0; }
  .name { font-size: 16px; font-weight: 650; letter-spacing: -0.01em; margin-bottom: 3px; }
  .activity { font-size: 13px; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sub { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); margin-top: 6px; letter-spacing: 0.04em; }

  .state { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .pill {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px; font-weight: 600;
  }
  .pill.activo { color: var(--live); background: var(--live-glow); }
  .pill.pendiente { color: var(--idle); background: rgba(216,169,63,0.12); }
  .last { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

  .empty, .error {
    text-align: center; padding: 50px 20px; color: var(--ink-dim);
    font-family: var(--mono); font-size: 13px; line-height: 1.7;
  }
  .error { color: var(--idle); }
  .error code { color: var(--ink); background: #0c121b; padding: 2px 7px; border-radius: 5px; }
  .skel { height: 84px; border-radius: 14px; background: linear-gradient(90deg,#111823 25%,#16202e 50%,#111823 75%); background-size: 200% 100%; animation: sh 1.4s infinite; }
  @keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  footer { margin-top: 26px; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); text-align: center; line-height: 1.8; }
  footer a { color: var(--accent); text-decoration: none; }
  @media (max-width: 540px) {
    .agent { grid-template-columns: 38px 1fr; }
    .state { grid-column: 2; align-items: flex-start; flex-direction: row; margin-top: 4px; }
    .badge { width: 38px; height: 38px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title"><b>CENTRO</b> DE AGENTES</div>
    <div class="clock" id="clock"></div>
  </header>
  <div class="sync"><span class="dot"></span><span id="syncmsg">Conectando con el repositorio…</span></div>
  <div class="grid" id="grid">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
  <footer>
    Control en vivo · <a href="https://claude.ai/code/routines" target="_blank">Gestionar rutinas →</a><br>
    Lee <span id="repolabel">PGB2003/agents-status</span> · refresco automático cada 60s
  </footer>
</div>

<script>
  const REPO = "PGB2003/agents-status";
  const FILE = "estado.json";
  const API = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

  const LABELS = {
    "personal":     { name: "NAHO (daily lifestyle)",        sigla: "NA" },
    "bickdata":     { name: "DANI (BickData assistant)",     sigla: "DA" },
    "job-search":   { name: "ROMI (job search)",             sigla: "RO" },
    "quantedge":    { name: "ANTO (quant trading)",          sigla: "AN" },
    "licitaciones": { name: "PAME (state contracts)",        sigla: "PA" }
  };

  const ORDER = ["personal","bickdata","job-search","quantedge","licitaciones"];

  function tick() {
    const now = new Date();
    const f = now.toLocaleString("es-PE", { timeZone: "America/Lima", hour12: false,
      weekday: "short", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
    document.getElementById("clock").textContent = f.toUpperCase() + " · LIMA";
  }
  setInterval(tick, 1000); tick();

  function fmtDate(d) {
    if (!d) return "—";
    try { return new Date(d + "T00:00:00").toLocaleDateString("es-PE", { day:"2-digit", month:"short" }); }
    catch { return d; }
  }

  function render(data) {
    const grid = document.getElementById("grid");
    const agents = data.agentes || {};
    grid.innerHTML = "";
    ORDER.forEach(key => {
      const a = agents[key]; if (!a) return;
      const meta = LABELS[key] || { name: key, sigla: "??" };
      const st = (a.estado || "off").toLowerCase();
      const el = document.createElement("div");
      el.className = "agent " + st;
      el.innerHTML = `
        <div class="badge">${meta.sigla}</div>
        <div class="meta">
          <div class="name">${meta.name}</div>
          <div class="activity">${a.ultima_actividad || "Sin actividad registrada"}</div>
          ${a.cadencia ? `<div class="sub">↻ ${a.cadencia}</div>` : ``}
          ${typeof a.racha === "number" ? `<div class="sub">🔥 racha: ${a.racha} día${a.racha === 1 ? "" : "s"}</div>` : ``}
        </div>
        <div class="state">
          <span class="pill ${st}">${st}</span>
          <span class="last">últ. ${fmtDate(a.ultima_corrida)}</span>
        </div>`;
      grid.appendChild(el);
    });
    const msg = document.getElementById("syncmsg");
    msg.textContent = "Sincronizado · " + (data.ultima_actualizacion ? "datos al " + fmtDate(data.ultima_actualizacion) : "en vivo");
  }

  function showError(detail) {
    document.getElementById("grid").innerHTML = `
      <div class="error">No se pudo leer el repositorio.<br>
      Verifica que <code>${REPO}</code> exista, sea <b>público</b> y contenga <code>${FILE}</code>.<br><br>
      <span style="color:var(--ink-faint)">${detail || ""}</span></div>`;
    document.getElementById("syncmsg").textContent = "Sin conexión con el repo";
  }

  async function load() {
    try {
      const r = await fetch(API + "?t=" + Date.now(), { headers: { "Accept": "application/vnd.github.v3+json" } });
      if (!r.ok) { showError("HTTP " + r.status + (r.status===404 ? " — repo o archivo no encontrado" : "")); return; }
      const j = await r.json();
      const content = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ""))));
      render(JSON.parse(content));
    } catch (e) { showError(e.message); }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
